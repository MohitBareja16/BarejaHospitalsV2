version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hospital_db
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: change_this_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hospital_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hospital_api
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      DATABASE_URL: postgresql://hospital_user:change_this_password@postgres:5432/hospital_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: https://your-frontend-domain.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    command: gunicorn -c gunicorn_config.py wsgi:app

  celery_worker:
    build: .
    container_name: hospital_celery_worker
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://hospital_user:change_this_password@postgres:5432/hospital_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: celery -A app.celery worker --loglevel=info

  celery_beat:
    build: .
    container_name: hospital_celery_beat
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://hospital_user:change_this_password@postgres:5432/hospital_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: celery -A app.celery beat --loglevel=info

volumes:
  postgres_data:
